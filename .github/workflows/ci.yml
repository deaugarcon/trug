name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: brew install autoconf automake libtool pkg-config openssl@3
      - name: Cache Vendor
        uses: actions/cache@v4
        with:
          path: Vendor
          key: vendor-${{ runner.arch }}-${{ hashFiles('Scripts/deps.lock', 'Scripts/build-deps.sh') }}
      - name: Build C dependencies
        run: ./Scripts/build-deps.sh
      - name: Lint (no UI imports in Core)
        run: ./Scripts/lint-no-ui-imports.sh
      - name: Check license files
        run: |
          test -f LICENSE && test -f NOTICE
          for lib in libimobiledevice libusbmuxd libimobiledevice-glue libplist; do
            grep -q "$lib" NOTICE || { echo "FAIL: $lib missing from NOTICE" >&2; exit 1; }
          done
      - name: Build
        run: ./Scripts/dev.sh build
      - name: Test
        run: ./Scripts/dev.sh test
